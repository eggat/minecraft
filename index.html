<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft 附魔報價系統</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <div class="panel-left">
            <h2 class="panel-title">選擇裝備</h2>
            <div class="eq-grid">
                <button class="eq-btn" data-slot="helmet" onclick="selectEquipment('helmet')">頭盔</button>
                <button class="eq-btn" data-slot="chestplate" onclick="selectEquipment('chestplate')">胸甲</button>
                <button class="eq-btn" data-slot="leggings" onclick="selectEquipment('leggings')">護腿</button>
                <button class="eq-btn" data-slot="boots" onclick="selectEquipment('boots')">靴子</button>
                <button class="eq-btn" data-slot="sword" onclick="selectEquipment('sword')">劍</button>
                <button class="eq-btn" data-slot="pickaxe" onclick="selectEquipment('pickaxe')">鎬</button>
                <button class="eq-btn" data-slot="axe" onclick="selectEquipment('axe')">斧</button>
                <button class="eq-btn" data-slot="shovel" onclick="selectEquipment('shovel')">鏟</button>
                <button class="eq-btn" data-slot="hoe" onclick="selectEquipment('hoe')">鋤</button>
                <button class="eq-btn" data-slot="mace" onclick="selectEquipment('mace')">重錘</button>
                <button class="eq-btn" data-slot="spear" onclick="selectEquipment('spear')">長矛</button>
                <button class="eq-btn" data-slot="trident" onclick="selectEquipment('trident')">三叉戟</button>
                <button class="eq-btn" data-slot="bow" onclick="selectEquipment('bow')">弓</button>
                <button class="eq-btn" data-slot="crossbow" onclick="selectEquipment('crossbow')">弩</button>
                <button class="eq-btn" data-slot="fishing" onclick="selectEquipment('fishing')">釣竿</button>
                <button class="eq-btn" data-slot="elytra" onclick="selectEquipment('elytra')">鞘翅</button>
            </div>
        </div>

        <div class="panel-center">
            <div id="state-0" class="state-panel active">
                <div class="placeholder-text">請從左側選擇要附魔的裝備</div>
            </div>

            <div id="state-1" class="state-panel">
                <h2 class="panel-title">選擇材質</h2>
                <div class="material-selection">
                    <button class="material-btn" onclick="selectMaterial('鑽石')">💎 鑽石</button>
                    <button class="material-btn" onclick="selectMaterial('獄髓')">🔥 獄髓</button>
                </div>
            </div>

            <div id="state-2" class="state-panel">
                <div class="enchant-header">
                    <h2 class="panel-title" id="current-equip-title" style="border:none; padding:0;">挑選附魔</h2>
                    <input type="text" id="search-box" placeholder="搜尋附魔..." onkeyup="filterEnchants()">
                </div>
                <div id="enchant-list" class="enchant-list"></div>
            </div>
        </div>

        <div class="panel-right">
            <h2 class="panel-title">報價單</h2>
            <div id="selected-list" class="cart-list"></div>
            
            <div class="cart-footer">
                <div class="total-row">
                    <span>總金額:</span>
                    <span id="total-price-value" class="total-price">0</span>
                </div>
                <div class="export-actions">
                    <button class="export-btn" onclick="if(typeof exportTXT === 'function') exportTXT();">📄 匯出 TXT</button>
                    <button class="export-btn" onclick="if(typeof exportJSON === 'function') exportJSON();">📦 匯出 JSON</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/calculator.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
    <script src="js/export.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
