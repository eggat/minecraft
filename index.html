<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft 附魔報價系統</title>
    <link rel="stylesheet" href="css/style.css?v=3">
</head>

<body>
    <div class="container">
        <header class="header">
            <h1>Minecraft 附魔報價系統</h1>
        </header>

        <main class="layout-grid">
            <section class="panel equipment-panel">
                <h2>挑選裝備</h2>
                <div class="equipment-list" id="equipment-list">
                    <button class="eq-btn" data-slot="helmet">頭盔</button>
                    <button class="eq-btn" data-slot="chestplate">胸甲</button>
                    <button class="eq-btn" data-slot="leggings">護腿</button>
                    <button class="eq-btn" data-slot="boots">靴子</button>
                    <button class="eq-btn" data-slot="elytra">鞘翅</button>
                    <button class="eq-btn" data-slot="sword">劍</button>
                    <button class="eq-btn" data-slot="axe">斧</button>
                    <button class="eq-btn" data-slot="pickaxe">鎬</button>
                    <button class="eq-btn" data-slot="shovel">鏟</button>
                    <button class="eq-btn" data-slot="hoe">鋤</button>
                    <button class="eq-btn" data-slot="bow">弓</button>
                    <button class="eq-btn" data-slot="crossbow">弩</button>
                    <button class="eq-btn" data-slot="trident">三叉戟</button>
                    <button class="eq-btn" data-slot="fishing">釣竿</button>
                    <button class="eq-btn" data-slot="mace">重錘</button>
                    <button class="eq-btn" data-slot="spear">長矛</button>
                </div>
            </section>

            <section class="panel enchant-panel" id="main-action-panel">
                <h2>配置面板</h2>

                <div id="state-empty"
                    style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80%; color: #888;">
                    <div style="font-size: 4rem; margin-bottom: 20px; opacity: 0.5;">👈</div>
                    <h3>請先從左側選擇一個裝備項目</h3>
                    <p style="margin-top: 10px; font-size: 0.9rem;">盔甲將進入材質選擇分支，工具與武器將直接展開附魔</p>
                </div>

                <div id="state-material"
                    style="display: none; flex-direction: column; align-items: center; justify-content: center; height: 80%;">
                    <h3 id="material-title" style="color: var(--tab-active); margin-bottom: 10px; font-size: 1.5rem;">
                        選擇材質</h3>
                    <p style="color: #aaa; margin-bottom: 30px;">請選擇您要建立的裝備材質</p>
                    <div id="material-btn-group" style="display: flex; gap: 20px;">
                    </div>
                </div>

                <div id="state-enchant" style="display: none;">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
                        <h3 id="enchant-target-title" style="color: var(--tab-active); margin: 0; font-size: 1.2rem;">✨
                            正在配置：</h3>
                    </div>

                    <div id="trim-preview-container" style="display: none; justify-content: space-between; align-items: center; background: #1f1f22; padding: 12px 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333;">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div id="trim-visual-icon" style="width: 36px; height: 36px; background: #27272a; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; border: 2px solid #444; transition: all 0.3s ease;">👕</div>
                            <div style="display: flex; flex-direction: column;">
                                <span style="color: #fff; font-size: 0.95rem; font-weight: bold;">裝備模板 (Armor Trim)</span>
                                <span id="trim-text-desc" style="color: #a1a1aa; font-size: 0.85rem;">尚未套用</span>
                            </div>
                        </div>
                        <button id="btn-open-trim" style="background: #3f3f46; color: #fff; border: 1px solid #52525b; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: 0.2s;">設定模板</button>
                    </div>

                    <div class="search-bar">
                        <input type="text" id="search-input" placeholder="搜尋附魔...">
                    </div>

                    <div class="category-tabs" id="category-tabs">
                        <button class="tab-btn active" data-category="普通">普通附魔</button>
                        <button class="tab-btn" data-category="特殊">特殊附魔</button>
                        <button class="tab-btn" data-category="收藏">⭐ 收藏</button>
                        <button class="tab-btn" data-category="最近">🕒 最近</button>
                    </div>

                    <div class="enchant-list" id="enchant-list">
                    </div>
                </div>
            </section>

            <section class="panel cart-panel">
                <h2>已選報價單</h2>
                <div class="selected-list" id="selected-list"
                    style="border: none; background: transparent; padding: 0;">
                </div>

                <div class="summary-box">
                    <div class="total-price">
                        總價：<span id="total-price-value">0</span>
                    </div>
                    <div class="action-buttons">
                        <button id="btn-clear" class="btn btn-danger">清空</button>
                        <button id="btn-copy" class="btn btn-primary">複製報價</button>
                    </div>
                    <div class="action-buttons" style="margin-top: 10px;">
                        <button id="btn-export-txt" class="btn" style="background-color: #3a3a45; color: #ccc;">匯出
                            TXT</button>
                        <button id="btn-export-json" class="btn" style="background-color: #3a3a45; color: #ccc;">匯出
                            JSON</button>
                    </div>
                </div>
            </section>
        </main>

        <div id="trim-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px);">
            <div style="background: var(--panel-bg); width: 90%; max-width: 600px; border-radius: 16px; border: 1px solid var(--border-color); padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); display: flex; flex-direction: column; gap: 20px;">
                
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px;">
                    <h3 style="color: #fff; margin: 0; font-size: 1.3rem;">🎨 配置裝備模板 (Armor Trim)</h3>
                    <button onclick="document.getElementById('trim-modal').style.display='none'" style="background: transparent; border: none; color: #aaa; font-size: 1.8rem; cursor: pointer; line-height: 1; transition: 0.2s;">&times;</button>
                </div>
                
                <div>
                    <h4 style="color: #e4e4e7; margin-bottom: 12px; font-size: 1rem;">1. 選擇圖案 (Pattern)</h4>
                    <div id="trim-pattern-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; max-height: 160px; overflow-y: auto; padding-right: 5px;">
                        </div>
                </div>

                <div>
                    <h4 style="color: #e4e4e7; margin-bottom: 12px; font-size: 1rem;">2. 選擇材質 (Material)</h4>
                    <div id="trim-material-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px;">
                        </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; background: #18181b; padding: 15px; border-radius: 12px; border: 1px solid #333; margin-top: 5px;">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <div id="modal-trim-preview-icon" style="width: 50px; height: 50px; background: #27272a; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; border: 2px solid #444; transition: all 0.3s ease;">👕</div>
                        <div>
                            <div style="color: #fff; font-weight: bold; font-size: 1.1rem;" id="modal-trim-preview-name">尚未選擇</div>
                            <div style="color: #a1a1aa; font-size: 0.9rem;">即時顏色預覽</div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button id="btn-remove-trim" class="btn" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); display: none; padding: 8px 15px;">移除</button>
                        <button id="btn-apply-trim" class="btn" style="background: var(--primary-color, #6366f1); color: #fff; border: none; padding: 8px 20px;">套用</button>
                    </div>
                </div>

            </div>
        </div>

        <div id="toast-container" class="toast-container"></div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/calculator.js"></script>
    <script src="js/search.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/export.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
