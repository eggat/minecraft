<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Minecraft 附魔報價系統</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <div class="panel-left">
            <button class="eq-btn" data-slot="helmet" onclick="Cart.addEquipment('helmet')">頭盔</button>
            <button class="eq-btn" data-slot="chestplate" onclick="Cart.addEquipment('chestplate')">胸甲</button>
            <button class="eq-btn" data-slot="leggings" onclick="Cart.addEquipment('leggings')">護腿</button>
            <button class="eq-btn" data-slot="boots" onclick="Cart.addEquipment('boots')">靴子</button>
            <button class="eq-btn" data-slot="sword" onclick="Cart.addEquipment('sword')">劍</button>
            <button class="eq-btn" data-slot="pickaxe" onclick="Cart.addEquipment('pickaxe')">鎬</button>
            <button class="eq-btn" data-slot="axe" onclick="Cart.addEquipment('axe')">斧</button>
            <button class="eq-btn" data-slot="shovel" onclick="Cart.addEquipment('shovel')">鏟</button>
            <button class="eq-btn" data-slot="hoe" onclick="Cart.addEquipment('hoe')">鋤</button>
            <button class="eq-btn" data-slot="mace" onclick="Cart.addEquipment('mace')">重錘</button>
            <button class="eq-btn" data-slot="spear" onclick="Cart.addEquipment('spear')">長矛</button>
            <button class="eq-btn" data-slot="trident" onclick="Cart.addEquipment('trident')">三叉戟</button>
            <button class="eq-btn" data-slot="bow" onclick="Cart.addEquipment('bow')">弓</button>
            <button class="eq-btn" data-slot="crossbow" onclick="Cart.addEquipment('crossbow')">弩</button>
            <button class="eq-btn" data-slot="fishing" onclick="Cart.addEquipment('fishing')">釣竿</button>
            <button class="eq-btn" data-slot="elytra" onclick="Cart.addEquipment('elytra')">鞘翅</button>
        </div>

        <div class="panel-center">
            <div id="enchant-list" style="overflow-y: auto; height: 85vh;">
                <div style="text-align: center; color: #888; padding: 40px; font-size: 1.2rem;">請先從左側選擇要附魔的裝備</div>
            </div>
        </div>

        <div class="panel-right">
            <div id="selected-list" style="overflow-y: auto; height: 75vh;"></div>
            
            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #444; display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: bold; color: #fff;">
                <span>總金額:</span>
                <span id="total-price-value" style="color: var(--price-expensive, #ff9800);">0</span>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button onclick="if(typeof exportTXT === 'function') exportTXT();" style="flex: 1; padding: 10px; background: #333; color: #fff; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s;">匯出 TXT</button>
                <button onclick="if(typeof exportJSON === 'function') exportJSON();" style="flex: 1; padding: 10px; background: #333; color: #fff; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s;">匯出 JSON</button>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/calculator.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
    <script src="js/export.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
